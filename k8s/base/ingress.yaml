# Requires AWS Load Balancer Controller installed on the cluster.
# For manifest validation without ALB, use: kubectl port-forward -n webapp-fms svc/webapp-fms 8080:80
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webapp-fms
  namespace: webapp-fms
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /demo/fms/
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /demo/fms
            pathType: Prefix
            backend:
              service:
                name: webapp-fms
                port:
                  number: 80
